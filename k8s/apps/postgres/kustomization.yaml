apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: postgres

helmCharts:
  - name: postgresql
    repo:  https://charts.bitnami.com/bitnami
    version: 15.5.38
    valuesFile: values.yaml
    releaseName: main
    namespace: postgres
    includeCRDs: true

resources:
  - secrets.yaml
