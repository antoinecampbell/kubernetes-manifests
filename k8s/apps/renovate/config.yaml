---
apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-config
data:
  config.json: |-
    {
      "repositories": [
        "antoinecampbell/kubernetes-manifests",
        "antoinecampbell/home-media-server",
        "antoinecampbell/operaton-testing"
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-variables
data:
  RENOVATE_AUTODISCOVER: 'false'
  RENOVATE_ENDPOINT: 'https://api.github.com'
  RENOVATE_GIT_AUTHOR: 'Renovate Bot <bot@renovateapp.com>'
  RENOVATE_PLATFORM: 'github'
  RENOVATE_CONFIG_FILE: '/opt/renovate/config.json'
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: renovate-env
  namespace: renovate
spec:
  encryptedData:
    RENOVATE_TOKEN: 
  template:
    metadata:
      name: renovate-env
      namespace: renovate
