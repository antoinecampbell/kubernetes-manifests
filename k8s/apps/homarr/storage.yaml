---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: homarr-database
spec:
  capacity:
    storage: 50Mi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: microk8s-hostpath
  hostPath:
    path: /home/antoine/home-server/homarr/database
    type: DirectoryOrCreate
