apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: homarr

helmCharts:
  - name: homarr
    repo:  oci://ghcr.io/homarr-labs/charts
    version: 8.19.0
    valuesFile: values.yaml
    releaseName: homarr
    namespace: homarr
    includeCRDs: true

resources:
  - secrets.yaml
  - storage.yaml
