apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 10.1.0
    valuesFile: values.yaml
    releaseName: argocd
    namespace: argocd
    includeCRDs: true
    apiVersions:
      - monitoring.coreos.com/v1

resources:
  - secrets.yaml
