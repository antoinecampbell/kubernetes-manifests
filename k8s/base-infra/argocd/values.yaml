configs:
  secret:
    createSecret: false
  cm:
    kustomize.buildOptions: "--enable-helm"
  params:
    server.insecure: true

# Disable unused controllers
dex:
  enabled: false
notifications:
  enabled: false

global:
  domain: argocd.home-server.antoine-campbell.com

controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  staticAssets:
    enabled: true
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: true
    enabled: true
    extraTls:
      - secretName: home-server-wildcard-signed-prod

repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

redis:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
