apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: antoine@antoine-campbell.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - selector:
          dnsNames:
            - "home-server.anotine-campbell.com"
            - "*.home-server.antoine-campbell.com"
        dns01:
          cloudflare:
            email: antoine.s.campbell@gmail.com
            apiKeySecretRef:
              name: cloudflare-api-key-secret
              key: api-key
