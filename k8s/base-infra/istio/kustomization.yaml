apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: istio-system

helmCharts:
  - name: base
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.2
    valuesFile: values-base.yaml
    releaseName: base
    namespace: istio-system
    includeCRDs: true
  - name: istiod
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.2
    valuesFile: values-istiod.yaml
    releaseName: istiod
    namespace: istio-system
    includeCRDs: true
  - name: cni
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.2
    valuesFile: values-cni.yaml
    releaseName: cni
    namespace: istio-system
    includeCRDs: true
  - name: ztunnel
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.2
    valuesFile: values-ztunnel.yaml
    releaseName: ztunnel
    namespace: istio-system
    includeCRDs: true
  - name: gateway
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.2
    valuesFile: values-gateway.yaml
    releaseName: gateway
    namespace: istio-system
    includeCRDs: true

resources:
  - k8s-gateway-crds-1.4.0.yaml
