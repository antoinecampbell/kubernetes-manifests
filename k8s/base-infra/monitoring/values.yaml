prometheus:
  prometheusSpec:
    retention: 7d
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: microk8s-hostpath
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
          selector:
            matchLabels:
              monitoring/component: prometheus
  ingress:
    enabled: true
    hosts:
      - prometheus.home-server.antoine-campbell.com
    tls:
      - secretName: home-server-wildcard-signed-prod
alertmanager:
  ingress:
    enabled: true
    hosts:
      - alertmanager.home-server.antoine-campbell.com
    tls:
      - secretName: home-server-wildcard-signed-prod
grafana:
  persistence:
    enabled: true
    existingClaim: grafana-pvc
  grafana.ini:
    server:
      domain: grafana.home-server.antoine-campbell.com
  ingress:
    enabled: true
    hosts:
      - grafana.home-server.antoine-campbell.com
    tls:
      - secretName: home-server-wildcard-signed-prod
