fullnameOverride: kube-prom
prometheus:
  prometheusSpec:
    retention: 7d
    retentionSize: 3GB
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    resources:
      requests:
        memory: 1Gi
      limits:
        memory: 4Gi
    additionalArgs:
      - name: query.max-concurrency
        value: "4"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: microk8s-hostpath
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
  ingress:
    enabled: true
    hosts:
      - prometheus.home-server.antoine-campbell.com
    tls:
      - secretName: home-server-wildcard-signed-prod
alertmanager:
  ingress:
    enabled: true
    hosts:
      - alertmanager.home-server.antoine-campbell.com
    tls:
      - secretName: home-server-wildcard-signed-prod
grafana:
  admin:
    existingSecret: grafana-admin
  persistence:
    enabled: true
  grafana.ini:
    server:
      domain: grafana.home-server.antoine-campbell.com
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
  ingress:
    enabled: true
    hosts:
      - grafana.home-server.antoine-campbell.com
    tls:
      - secretName: home-server-wildcard-signed-prod
  sidecar:
    skipTlsVerify: true
    alerts:
      env:
        HEALTH_PORT: "8081"
    dashboards:
      env:
        HEALTH_PORT: "8084"
    datasources:
      env:
        HEALTH_PORT: "8082"
    notifiers:
      env:
        HEALTH_PORT: "8083"
