prometheus:
  prometheusSpec:
    retention: 7d
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
  ingress:
    enabled: true
    hosts:
      - prometheus.home-server.antoine-campbell.com
    tls:
      - secretName: home-server-wildcard-signed-prod
alertmanager:
  ingress:
    enabled: true
    hosts:
      - alertmanager.home-server.antoine-campbell.com
    tls:
      - secretName: home-server-wildcard-signed-prod
grafana:
  persistence:
    enabled: true
    existingClaim: grafana-pvc
  grafana.ini:
    server:
      domain: grafana.home-server.antoine-campbell.com
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
  ingress:
    enabled: true
    hosts:
      - grafana.home-server.antoine-campbell.com
    tls:
      - secretName: home-server-wildcard-signed-prod
