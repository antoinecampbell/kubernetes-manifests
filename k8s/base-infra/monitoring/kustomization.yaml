apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - storage.yaml

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 58.7.2
    releaseName: kube-prom
    namespace: monitoring
    includeCRDs: true
    valuesFile: values.yaml
