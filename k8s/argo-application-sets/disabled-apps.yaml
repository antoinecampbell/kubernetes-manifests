---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: camunda-platform
  namespace: argocd
  labels:
    name: camunda-platform
spec:
  project: default
  source:
    repoURL: git@github.com:antoinecampbell/kubernetes-manifests.git
    targetRevision: HEAD
    path: k8s/apps/camunda-platform
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
