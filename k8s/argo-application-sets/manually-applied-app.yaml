---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  labels:
    name: app-of-apps
spec:
  project: default
  source:
    repoURL: git@github.com:antoinecampbell/kubernetes-manifests.git
    targetRevision: HEAD
    path: k8s/argo-application-sets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
